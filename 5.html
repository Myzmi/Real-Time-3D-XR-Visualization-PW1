<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Three.js - PW1 - Exercise 5</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        #c {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Target the buttons generated by Three.js */
        #VRButton {
            left: calc(50% - 120px) !important;
        }

        #ARButton {
            left: calc(50% + 10px) !important;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
</body>
<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/",
      "three/addons/libs/lil-gui": "https://unpkg.com/three@0.182.0/examples/jsm/libs/lil-gui.module.min.js",
      "./scene_objects.js": "./scene_objects.js"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { createSceneObjects, createRobot, createGUI } from './scene_objects.js';

    function main() {
        const canvas = document.querySelector('#c');
        const renderer = new THREE.WebGLRenderer({ canvas,
                                                alpha: true,      //required for ar
                                                antialias: true});

        const fov = 40;
        const fovPOV = 90;
        const aspect = 2;  // the canvas default
        const near = 0.1;
        const far = 1000;
        const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
        camera.position.set(3, 1, 3);
        //camera.up.set(0, 0, 1);
        camera.lookAt(0, 0, 0);

        const cameraPOV = new THREE.PerspectiveCamera(fovPOV, aspect, near, far);
        cameraPOV.position.set(3, 2, 3);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color( 0x3D3D3D );

        const color = 0xffffff;
        const intensity = 6;
        const light = new THREE.PointLight(color, intensity);
        light.position.set(0, 1.8, -1.2);
        light.castShadow = true;
        light.shadow.mapSize.width = 2048; 
        light.shadow.mapSize.height = 2048;
        scene.add(light);
        //const cameraHelper = new THREE.CameraHelper(light.shadow.camera);
        //scene.add(cameraHelper);

        const AmbientLight = new THREE.AmbientLight( 0x404040, 10); // soft white light
        scene.add( AmbientLight );

        renderer.shadowMap.enabled = true //shadow map
        renderer.shadowMap.type = THREE.PCFSoftShadowMap ;

        //XR SETUP
        var xr_flag = false;
        renderer.xr.enabled = true;
        const controller1 = renderer.xr.getController(0);
        const controller2 = renderer.xr.getController(1);
        scene.add(controller1, controller2);

        //create a vr rig
        const userRig = new THREE.Group();
        scene.add(userRig);

        //add the camera and controllers to the rig
        userRig.add(cameraPOV);
        userRig.add(controller1);
        userRig.add(controller2);

        //move the rig to robot
        userRig.rotation.y = Math.PI;
        //userRig.scale.set(10, 10, 10);
        //userRig.position.set(0, -0.8, -1.60); 

        //add vr button
        const vrBtn = VRButton.createButton(renderer);
        document.body.appendChild(vrBtn);

        //add ar button
        const arBtn = ARButton.createButton(renderer, {
            optionalFeatures: ['dom-overlay'],
            domOverlay: { root: document.body }
        });
        document.body.appendChild(arBtn);

        //controller markers
        const markerGeom = new THREE.SphereGeometry(0.1);
        const markerMat = new THREE.MeshBasicMaterial({ 
            color: 0xff0000,
            transparent: true,
            opacity: 0.5
        });
        const marker1 = new THREE.Mesh(markerGeom, markerMat);
        const marker2 = new THREE.Mesh(markerGeom, markerMat.clone());
        marker2.material.color.set(0x0000ff);
        controller1.add(marker1);
        controller2.add(marker2);

        // OBJECTS
        const sceneAssets = createSceneObjects(scene);

        //ROBOT
        const robotAssets = createRobot(scene);

        //GUI
        const gui = createGUI(sceneAssets, robotAssets, light);

        function resizeRendererToDisplaySize(renderer) {
            const canvas = renderer.domElement;
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            const needResize = canvas.width !== width || canvas.height !== height;
            if (needResize) {
                renderer.setSize(width, height, false);
            }
            return needResize;
        }

        vrBtn.addEventListener( 'pointerdown', function() {

            userRig.position.set(0, -0.8, -1.60);

            xr_flag = true;

        } );
        
        arBtn.addEventListener( 'pointerdown', function() {

            sceneAssets.back_plane.visible = false;
            sceneAssets.left_plane.visible = false;
            sceneAssets.floor_plane.visible = false;

            userRig.position.set(0, 0.8, -1.60);

            xr_flag = true;

            scene.background = null;

        } );

        //xr event listener
        renderer.xr.addEventListener('sessionend', () => {
            sceneAssets.back_plane.visible = true;
            sceneAssets.left_plane.visible = true;
            sceneAssets.floor_plane.visible = true;

            xr_flag = false;

            console.log("Session Ended");

            scene.background = new THREE.Color( 0x3D3D3D );
        });

        const controls = new OrbitControls(camera, renderer.domElement);

        renderer.setAnimationLoop(render);

        function render(time) {
            //handle resize (Only when not in VR)
            if (!xr_flag) {
                if (resizeRendererToDisplaySize(renderer)) {
                    camera.aspect = canvas.clientWidth / canvas.clientHeight;
                    camera.updateProjectionMatrix();
                }
            }

            if (controller1.visible) {
                //IK HAND MOVEMENT
                //get current physical lengths from world positions
                const pShoulder_r = new THREE.Vector3();
                const pElbow_r = new THREE.Vector3();
                const pHand_r = new THREE.Vector3();
                const pShoulder_l = new THREE.Vector3();
                robotAssets.right_shoulder.getWorldPosition(pShoulder_r);
                robotAssets.right_elbow.getWorldPosition(pElbow_r);
                robotAssets.right_hand.getWorldPosition(pHand_r);
                robotAssets.left_shoulder.getWorldPosition(pShoulder_l);

                //calculate lenghts
                const L1 = pShoulder_r.distanceTo(pElbow_r);
                const L2 = pElbow_r.distanceTo(pHand_r);

                //get targets
                const targetWorld_r = new THREE.Vector3();
                controller1.getWorldPosition(targetWorld_r);
                const targetWorld_l = new THREE.Vector3();
                controller2.getWorldPosition(targetWorld_l);

                //solve IK right arm
                const dist_r = pShoulder_r.distanceTo(targetWorld_r);
                const totalReach = L1 + L2;
                const D_r = Math.min(dist_r, totalReach - (totalReach * 0.01));

                const cosBeta_r = (D_r * D_r - L1 * L1 - L2 * L2) / (2 * L1 * L2);
                const beta_r = Math.acos(THREE.MathUtils.clamp(cosBeta_r, -1, 1));

                const cosAlpha_r = (L1 * L1 + D_r * D_r - L2 * L2) / (2 * L1 * D_r);
                const alpha_r = Math.acos(THREE.MathUtils.clamp(cosAlpha_r, -1, 1));

                //update right arm
                robotAssets.right_shoulder.rotation.set(0, 0, 0); 
                robotAssets.right_shoulder.lookAt(targetWorld_r);
                robotAssets.right_shoulder.rotateX(-Math.PI/2);
                robotAssets.right_shoulder.rotateX(alpha_r);
                
                robotAssets.right_elbow.rotation.set(0, 0, 0); 
                robotAssets.right_elbow.rotation.x = -beta_r; 

                //solve IK left arm
                const dist_l = pShoulder_l.distanceTo(targetWorld_l);
                const D_l = Math.min(dist_l, totalReach - (totalReach * 0.01));

                const cosBeta_l = (D_l * D_l - L1 * L1 - L2 * L2) / (2 * L1 * L2);
                const beta_l = Math.acos(THREE.MathUtils.clamp(cosBeta_l, -1, 1));

                const cosAlpha_l = (L1 * L1 + D_l * D_l - L2 * L2) / (2 * L1 * D_l);
                const alpha_l = Math.acos(THREE.MathUtils.clamp(cosAlpha_l, -1, 1));

                //update left arm
                robotAssets.left_shoulder.rotation.set(0, 0, 0);
                robotAssets.left_shoulder.lookAt(targetWorld_l);
                robotAssets.left_shoulder.rotateX(-Math.PI/2);
                robotAssets.left_shoulder.rotateX(alpha_l);

                robotAssets.left_elbow.rotation.set(0, 0, 0);
                robotAssets.left_elbow.rotation.x = -beta_l;
            }

            const session = renderer.xr.getSession();
            if (session) {
                for (const source of session.inputSources) {
                    if (source.gamepad) {
                        //button control to exit vr
                        const backButtonPressed = source.gamepad.buttons[4]?.pressed;
                        
                        if (backButtonPressed) {
                            session.end();
                        }
                    }
                }
            }

            if (xr_flag) {
                renderer.render(scene, cameraPOV);
            } else {
                renderer.render(scene, camera);
            }
        }
    }

    main();
</script>

</html>
