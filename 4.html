<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Three.js - PW1 - Exercise 4</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        #c {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
</body>
<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/",
      "three/addons/libs/lil-gui": "https://unpkg.com/three@0.182.0/examples/jsm/libs/lil-gui.module.min.js",
      "./scene_objects.js": "./scene_objects.js"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
import { createSceneObjects, createRobot, createGUI } from './scene_objects.js';

    function main() {
        const canvas = document.querySelector('#c');
        const renderer = new THREE.WebGLRenderer({ canvas });

        const fov = 40;
        const aspect = 2;  // the canvas default
        const near = 0.1;
        const far = 1000;
        const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
        camera.position.set(3, 2, 3);
        //camera.up.set(0, 0, 1);
        camera.lookAt(0, 0, 0);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color( 0x3D3D3D );

        const color = 0xffffff;
        const intensity = 6;
        const light = new THREE.PointLight(color, intensity);
        light.position.set(0, 1.8, -1.2);
        light.castShadow = true;
        light.shadow.mapSize.width = 2048; 
        light.shadow.mapSize.height = 2048;
        scene.add(light);
        //const cameraHelper = new THREE.CameraHelper(light.shadow.camera);
        //scene.add(cameraHelper);

        const AmbientLight = new THREE.AmbientLight( 0x404040, 10); // soft white light
        scene.add( AmbientLight );

        renderer.shadowMap.enabled = true //shadow map
        renderer.shadowMap.type = THREE.PCFSoftShadowMap ;

        // OBJECTS
        const sceneAssets = createSceneObjects(scene);

        //ROBOT
        const robotAssets = createRobot(scene);

        //GUI
        const gui = createGUI(sceneAssets, robotAssets, light);

        function resizeRendererToDisplaySize(renderer) {
            const canvas = renderer.domElement;
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            const needResize = canvas.width !== width || canvas.height !== height;
            if (needResize) {
                renderer.setSize(width, height, false);
            }
            return needResize;
        }

        const controls = new OrbitControls(camera, renderer.domElement);

        //animations state
        const animationState = {
            active: false,
            frame: 0
        };

        //spacebar event listener
        window.addEventListener('keydown', (event) => {
            if (event.code === 'Space' && !animationState.active) {
                animationState.active = true;
                animationState.frame = 0;
                event.preventDefault();
            }
        });

        //define a triggers object
        const triggers = {
            startAnimation: function() {
                if (!animationState.active) {
                    console.log("Animation triggered via GUI");
                    animationState.frame = 0; // Reset to start
                    animationState.active = true;
                }
            }
};

        //add trigger to GUI
        gui.add(triggers, 'startAnimation').name('Hand Wave(Spacebar)');

        function render(time) {
            if (resizeRendererToDisplaySize(renderer)) {
                const canvas = renderer.domElement;
                camera.aspect = canvas.clientWidth / canvas.clientHeight;
                camera.updateProjectionMatrix();
            }

            //hand wave animation
            if (animationState.active) {
                let i = animationState.frame;
                let t = i * 0.01;
                let step = 0.1;

                if (i < 20) {
                    robotAssets.left_shoulder.rotation.x += -step * 0.5;
                } else if (i < 30) {
                    robotAssets.left_elbow.rotation.x += -step * 0.8;
                } else if (i < 50) {
                    robotAssets.left_elbow.rotation.z -= step * 0.5;
                    robotAssets.left_shoulder.rotation.z -= step * 0.1;
                } else if (i < 70) {
                    robotAssets.left_elbow.rotation.z += step * 0.5;
                    robotAssets.left_shoulder.rotation.z += step * 0.1;
                } else if (i < 90) {
                    robotAssets.left_elbow.rotation.z -= step * 0.5;
                    robotAssets.left_shoulder.rotation.z -= step * 0.1;
                } else if (i < 110) {
                    robotAssets.left_elbow.rotation.z += step * 0.5;
                    robotAssets.left_shoulder.rotation.z += step * 0.1;
                }

                console.log(`Frame: ${animationState.frame}`);
                animationState.frame++;

                //end of animation
                if (i >= 110) {
                    animationState.active = false;
                    robotAssets.left_shoulder.rotation.x = -Math.PI / 2;
                    robotAssets.left_elbow.rotation.x = 0;
                    robotAssets.left_elbow.rotation.z = -Math.PI / 8;
                }

            }

            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }

        requestAnimationFrame(render);
    }

    main();
</script>

</html>
